apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-engine-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-engine
  template:
    metadata:
      labels:
        app: core-engine
    spec:
      initContainers:
        - name: prisma-migrate
          image: viniciusmoraodev/core-engine:v1.0.28
          command: ["sh","-c","npx prisma migrate deploy && node dist/prisma/seed.js"]
          env:
            - name: DATABASE_URL
              value: "postgresql://admin:admin123@40.82.176.176:5433/erp_core"
            - name: REDIS_URL
              value: "redis://40.82.176.176:6379"
      
      containers:
        - name: core-engine
          image: viniciusmoraodev/core-engine:v1.0.28
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            #Lucas mudou aqui
            - name: DATABASE_URL
              value: "postgresql://admin:admin123@40.82.176.176:5433/erp_core"
            - name: REDIS_URL
              value: "redis://http://40.82.176.176:6379"
            - name: JWT_SECRET
              value: "super-secret-key-change-in-production"
