apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform-backend
  template:
    metadata:
      labels:
        app: devops-platform-backend
    spec:
      containers:
        - name: backend
          image: viniciusmoraodev/devops-platform-backend:latest # Ajuste o nome da imagem
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_TYPE
              value: "sqlite"
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data # Onde o SQLite vai salvar o arquivo .db
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: devops-platform-backend-pvc