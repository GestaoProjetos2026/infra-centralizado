  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: core-engine-ingress
  spec:
    ingressClassName: traefik
    rules:
      - http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: core-engine-service
                  port:
                    number: 80
