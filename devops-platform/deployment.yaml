apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform
  template:
    metadata:
      labels:
        app: devops-platform
    spec:
      containers:
        - name: devops-platform
          image: viniciusmoraodev/devops-platform:v3.0.8
          ports:
            - containerPort: 80
