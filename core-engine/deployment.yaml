apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-engine-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-engine
  template:
    metadata:
      labels:
        app: core-engine
    spec:
      containers:
        - name: core-engine
          image: viniciusmoraodev/core-engine:main
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
