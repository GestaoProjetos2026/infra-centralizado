apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform-backend
  template:
    metadata:
      labels:
        app: devops-platform-backend
    spec:
      containers:
        - name: backend
          image: viniciusmoraodev/devops-platform-backend:v8.0.0
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: "postgres-svc.infra-banco.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "infra_banco"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: devops-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-db-secret
                  key: DB_PASSWORD