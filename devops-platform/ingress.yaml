apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: devops-platform.40.82.176.176.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devops-platform-backend-svc
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform-frontend-svc
                port:
                  number: 80
