apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core-engine-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: app.core-engine.local # Ajuste para seu domínio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.core-engine.local # Ajuste para seu domínio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
