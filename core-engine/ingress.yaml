apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core-engine-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.core-engine.40.82.176.176.nip.io
        - api.core-engine.40.82.176.176.nip.io
      secretName: core-engine-tls-secret
  rules:
    - host: app.core-engine.40.82.176.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-engine-frontend-svc 
                port:
                  number: 80
    - host: api.core-engine.40.82.176.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-engine-backend-svc 
                port:
                  number: 3000
