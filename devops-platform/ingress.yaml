apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: devops-platform.conexus.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform-service
                port:
                  number: 80
