apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-leads-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.crm-leads.40.82.176.176.nip.io
        - api.crm-leads.40.82.176.176.nip.io
      secretName: crm-leads-tls-secret
  rules:
    # 1. Rota do Frontend (Acessado pelo navegador)
    - host: app.crm-leads.40.82.176.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crm-leads-frontend-svc
                port:
                  number: 3032

    # 2. Rota do Backend (Consumida pelo Frontend)
    - host: api.crm-leads.40.82.176.176.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crm-leads-backend-svc
                port:
                  number: 3031
