apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.devops-platform.conexus.dev 
        - api.devops-platform.conexus.dev 
      secretName: devops-platform-tls-secret
  rules:
    - host: app.devops-platform.conexus.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform-frontend-svc
                port:
                  number: 80
    - host: api.devops-platform.conexus.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform-backend-svc
                port:
                  number: 3001
